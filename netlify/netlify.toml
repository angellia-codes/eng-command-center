# netlify.toml

[build]
  # Netlify will serve index.html as the SPA root.
  # The functions directory is where serverless functions live.
  functions = "netlify/functions"
  publish   = "."

# Redirect all non-asset requests to index.html for the SPA router
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Lock down the notification proxy: same-origin POST only
[[headers]]
  for = "/.netlify/functions/send-notification"
  [headers.values]
    Access-Control-Allow-Origin  = "same-origin"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
